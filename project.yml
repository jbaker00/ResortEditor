name: ResortEditor
options:
  bundleIdPrefix: com.globalvibes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  ResortEditor:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/ResortEditor
    resources:
      - Sources/ResortEditor/Resources
    dependencies:
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.globalvibes.ResortEditor
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        DEVELOPMENT_TEAM: 4PDB3TQD2G
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/ResortEditor/Resources/Info.plist
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
