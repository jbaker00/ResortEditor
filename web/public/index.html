<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resort Editor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="auth-icon">⛰️</div>
      <h1>Resort Editor</h1>
      <p class="auth-subtitle">Sign in to manage resort data</p>
      <button id="sign-in-btn" class="btn btn-primary btn-large">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:8px">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
      <div id="auth-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <h1>⛰️ Resort Editor</h1>
      <div class="header-actions">
        <button id="add-resort-btn" class="btn btn-primary">+ Add Resort</button>
        <button id="sign-out-btn" class="btn btn-ghost">Sign Out</button>
      </div>
    </header>

    <main class="main-content">
      <div id="resort-list" class="resort-grid">
        <div class="loading-placeholder">Loading resorts…</div>
      </div>
    </main>
  </div>

  <!-- Modal Form -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Resort</h2>
        <button id="modal-close-btn" class="btn-icon" aria-label="Close">✕</button>
      </div>
      <form id="resort-form" class="resort-form">
        <input type="hidden" id="form-doc-id" />
        <div class="form-grid">
          <div class="form-group span-2">
            <label for="form-name">Name *</label>
            <input type="text" id="form-name" placeholder="Resort name" required />
          </div>
          <div class="form-group">
            <label for="form-city">City</label>
            <input type="text" id="form-city" placeholder="City" />
          </div>
          <div class="form-group">
            <label for="form-country">Country</label>
            <input type="text" id="form-country" placeholder="Country" />
          </div>
          <div class="form-group">
            <label for="form-category">Category</label>
            <input type="text" id="form-category" placeholder="e.g. Beach, Ski, Golf" />
          </div>
          <div class="form-group">
            <label for="form-airport">Airport (IATA)</label>
            <input type="text" id="form-airport" placeholder="e.g. LAX" />
          </div>
          <div class="form-group span-2">
            <label for="form-image">Image URL</label>
            <input type="url" id="form-image" placeholder="https://..." />
          </div>
          <div class="form-group span-2">
            <label for="form-url">Website URL</label>
            <input type="url" id="form-url" placeholder="https://..." />
          </div>
          <div class="form-group span-2">
            <label for="form-description">Description</label>
            <textarea id="form-description" rows="4" placeholder="Describe the resort…"></textarea>
          </div>
        </div>
        <div id="form-error" class="error-msg hidden"></div>
        <div class="form-actions">
          <button type="button" id="form-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Resort</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK via CDN -->
  <script type="module" src="app.js"></script>
</body>
</html>
